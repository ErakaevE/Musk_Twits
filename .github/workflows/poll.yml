name: Poll X and post to Telegram

on:
  schedule:
    # Каждые 5 минут (GitHub может задерживать запуск на несколько минут
    # при высокой нагрузке на бесплатных раннерах — это нормально)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # позволяет запускать вручную из вкладки Actions

# Нужно, чтобы workflow мог коммитить обновлённый state.json обратно в репозиторий
permissions:
  contents: write

concurrency:
  group: poll-x
  cancel-in-progress: false  # не отменять предыдущий запуск, чтобы не терять твиты

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poller
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_USERNAME: elonmusk
        run: python poll.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
